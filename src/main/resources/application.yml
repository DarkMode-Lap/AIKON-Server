spring:
  application:
    name: aikon
  datasource:
    url: ${DATASOURCE_URL}
    username: ${USERNAME}
    password: ${PASSWORD}
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

aikon:
  frontend:
    public-base-url: ${FRONTEND_PUBLIC_BASE_URL:}
  sse:
    timeout-millis: 1800000
    heartbeat-interval-millis: 10000
    max-connections: 100

gemini:
  api-key: ${GEMINI_API_KEY:}
  image-model: ${GEMINI_IMAGE_MODEL:gemini-2.5-flash-image}

aws:
  region: ${AWS_REGION:ap-northeast-2}
  s3:
    bucket: ${S3_BUCKET:}
    public-base-url: ${S3_PUBLIC_BASE_URL:}
    endpoint: ${S3_ENDPOINT:}
    path-style-access-enabled: ${S3_PATH_STYLE_ACCESS_ENABLED:true}
